version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: konecta_postgres_db
    environment:
      - POSTGRES_USER=konecta
      - POSTGRES_PASSWORD=konecta_dev_password
      - POSTGRES_DB=konecta_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
